<script>

let fav = JSON.parse(localStorage.getItem("fav") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

/* =========================
   OPEN GAME
========================= */

function openGame(url) {
  const player = document.getElementById("player");
  const frame = document.getElementById("frame");

  player.style.display = "block";
  frame.src = url;

  // recent system (no duplicates + max 10)
  recent.unshift(url);
  recent = [...new Set(recent)].slice(0, 10);
  localStorage.setItem("recent", JSON.stringify(recent));
}

/* =========================
   CLOSE GAME
========================= */

function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

/* =========================
   SEARCH (FIXED + CLEAN)
========================= */

function searchGames() {
  let v = document.getElementById("search").value.toLowerCase();

  document.querySelectorAll(".card").forEach(c => {
    let title = c.querySelector("h3").innerText.toLowerCase();
    c.style.display = title.includes(v) ? "block" : "none";
  });
}

/* =========================
   FILTER CATEGORY
========================= */

function filter(cat) {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display =
      (cat === "all" || c.dataset.cat === cat)
        ? "block"
        : "none";
  });
}

/* =========================
   FAVORITES SYSTEM
========================= */

function toggleFav(e, el) {
  e.stopPropagation();

  let card = el.closest(".card");
  let url = card.dataset.url;

  if (fav.includes(url)) {
    fav = fav.filter(f => f !== url);
    el.innerText = "☆";
  } else {
    fav.push(url);
    el.innerText = "★";
  }

  localStorage.setItem("fav", JSON.stringify(fav));
}

/* =========================
   SHOW FAVORITES
========================= */

function showFavorites() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = fav.includes(c.dataset.url) ? "block" : "none";
  });
}

/* =========================
   SHOW RECENT
========================= */

function showRecent() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = recent.includes(c.dataset.url) ? "block" : "none";
  });
}

/* =========================
   SHOW ALL
========================= */

function showAll() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = "block";
  });
}

/* =========================
   INIT (FIXED CLICK SYSTEM)
   - replaces buggy inline onclick override
========================= */

function init() {
  document.querySelectorAll(".card").forEach(card => {
    let url = card.dataset.url;
    let star = card.querySelector(".star");

    // card click opens game
    card.addEventListener("click", () => {
      openGame(url);
    });

    // set star state on load
    if (fav.includes(url)) {
      star.innerText = "★";
    }
  });
}

init();

</script>
