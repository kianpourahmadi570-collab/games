<!DOCTYPE html>
<html>
<head>
  <title>Mathletics │ Online Learning Math Program</title>
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/3/30/Mathletics_Logo_%282019%29.png">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070b14;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background: #0f172a;
      padding: 15px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .nav-btn {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .nav-btn:hover {
      background: #334155;
    }

    .main {
      flex: 1;
      overflow-y: auto;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #0f172a;
      position: sticky;
      top: 0;
    }

    #search {
      padding: 8px;
      border-radius: 10px;
      border: none;
      width: 220px;
    }

    .section-title {
      margin: 20px;
      font-size: 18px;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 15px;
      padding: 0 20px 20px 20px;
    }

    .card {
      background: #111827;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
    }

    .card h3 {
      margin: 0;
      padding: 10px;
      font-size: 14px;
    }

    .star {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    #player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
      z-index: 999;
    }

    #player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #close {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo"> Kian Games</div>
  <button class="nav-btn" onclick="showAll()"> Home</button>
  <button class="nav-btn" onclick="filter('action')"> Action</button>
  <button class="nav-btn" onclick="filter('puzzle')"> Puzzle</button>
  <button class="nav-btn" onclick="filter('horror')"> Horror</button>
  <button class="nav-btn" onclick="showFavorites()"> Favorites</button>
  <button class="nav-btn" onclick="showRecent()"> Recent</button>
</div>

<div class="main">
  <div class="topbar">
    <div>Game Library</div>
    <input id="search" placeholder="Search games..." onkeyup="searchGames()">
  </div>

  <div class="section-title">Featured Games</div>

  <div class="grid" id="grid">

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 1</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 2</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 3</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 4</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 5</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 6</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 7</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 8</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 9</h3>
    </div>

    <div class="card" data-cat="" data-url="">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Game 10</h3>
    </div>

  </div>
</div>

<div id="player">
  <div id="close" onclick="closeGame()"> </div>
  <iframe id="frame"></iframe>
</div>

<script>
let fav = JSON.parse(localStorage.getItem("fav") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

document.querySelectorAll(".card").forEach(card => {
  card.onclick = () => openGame(card.dataset.url);
});

function openGame(url) {
  document.getElementById("player").style.display = "block";
  document.getElementById("frame").src = url;
  recent.unshift(url);
  recent = [...new Set(recent)].slice(0, 10);
  localStorage.setItem("recent", JSON.stringify(recent));
}

function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

function searchGames() {
  let v = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none";
  });
}

function filter(cat) {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = (cat === "all" || c.dataset.cat === cat) ? "block" : "none";
  });
}

function toggleFav(e, el) {
  e.stopPropagation();
  let card = el.closest(".card");
  let url = card.dataset.url;
  if (fav.includes(url)) {
    fav = fav.filter(f => f !== url);
    el.innerText = "☆";
  } else {
    fav.push(url);
    el.innerText = "★";
  }
  localStorage.setItem("fav", JSON.stringify(fav));
}

function showFavorites() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = fav.includes(c.dataset.url) ? "block" : "none";
  });
}

function showRecent() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = recent.includes(c.dataset.url) ? "block" : "none";
  });
}

function showAll() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = "block";
  });
}
</script>

</body>
</html>
