<!DOCTYPE html>
<html>
<head>
  <title>Kian's Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #111827;
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
    }

    #search {
      padding: 8px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game {
      background: #1f2937;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.06);
    }

    .game img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .game h3 {
      padding: 10px;
      font-size: 14px;
      margin: 0;
    }

    /* Player */
    #player {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 1000;
    }

    #player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 22px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>🎮 Kian Hub</h1>
  <input type="text" id="search" placeholder="Search..." onkeyup="searchGames()">
</div>

<div class="grid" id="gameGrid">

  <div class="game" onclick="openGame('https://example.com')">
    <img src="https://via.placeholder.com/300x140">
    <h3>Game 1</h3>
  </div>

  <div class="game" onclick="openGame('https://example.com')">
    <img src="https://via.placeholder.com/300x140">
    <h3>Game 2</h3>
  </div>

</div>

<div id="player">
  <span id="closeBtn" onclick="closeGame()">✖</span>
  <iframe id="frame"></iframe>
</div>

<script>
function openGame(url) {
  document.getElementById("player").style.display = "block";
  document.getElementById("frame").src = url;
}

function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

function searchGames() {
  let input = document.getElementById("search").value.toLowerCase();
  let games = document.querySelectorAll(".game");

  games.forEach(game => {
    let title = game.innerText.toLowerCase();
    game.style.display = title.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
