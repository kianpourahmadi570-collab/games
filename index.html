<!DOCTYPE html>
<html>
<head>
  <title>Mathletics │ Online Learning Math Program</title>
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/3/30/Mathletics_Logo_%282019%29.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070b14;
      color: white;
      display: flex;
    }

    /* Sidebar Styles */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: #0f172a;
      padding: 15px;
      box-sizing: border-box;
      position: fixed; /* Keeps sidebar fixed */
      left: 0;
      top: 0;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .nav-btn {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .nav-btn:hover {
      background: #334155;
    }

    /* Main Content Area */
    .main {
      flex: 1;
      margin-left: 240px; /* Offset for the fixed sidebar */
      min-height: 100vh;
      padding-bottom: 60px; /* Space so footer doesn't cover cards */
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #search {
      padding: 8px;
      border-radius: 10px;
      border: none;
      width: 220px;
    }

    .section-title {
      margin: 20px;
      font-size: 18px;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 15px;
      padding: 0 20px 20px 20px;
    }

    .card {
      background: #111827;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      background: #1e293b; /* Fallback if image is missing */
    }

    .card h3 {
      margin: 0;
      padding: 10px;
      font-size: 14px;
    }

    .star {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
      z-index: 5;
    }

    /* Game Player Overlay */
    #player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
      z-index: 999;
    }

    #player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #close {
      position: absolute;
      top: 15px;
      right: 25px;
      font-size: 35px;
      color: white;
      cursor: pointer;
      z-index: 1000;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* FOOTER PHRASE STYLE */
    .footer-phrase {
      position: fixed;
      bottom: 10px;
      left: 240px; /* Starts after sidebar */
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #64748b;
      pointer-events: none; /* Won't block clicks */
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Unblocked Yeronga SHS Games 😂</div>
  <button class="nav-btn" onclick="showAll()">Home</button>
  <button class="nav-btn" onclick="filter('fun')">Fun</button>
  <button class="nav-btn" onclick="filter('horror')">Horror</button>
  <button class="nav-btn" onclick="showFavorites()">Favorites</button>
  <button class="nav-btn" onclick="showRecent()">Recent</button>
</div>

<div class="main">
  <div class="topbar">
    <div>Game Library</div>
    <input id="search" placeholder="Search games..." onkeyup="searchGames()">
  </div>

  <div class="section-title">Featured Games</div>

  <div class="grid" id="grid">
    <div class="card" data-cat="horror" data-url="games/fnae/index.html">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>5 Nights at Epsteins</h3>
    </div>

    <div class="card" data-cat="fun" data-url="games/geometry-dash/index.html">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Geometry Dash</h3>
    </div>

    <div class="card" data-cat="fun" data-url="games/bitlife/index.html">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>BitLife</h3>
    </div>

    <div class="card" data-cat="fun" data-url="games/tnmn/index.html">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>TNMN</h3>
    </div>

    <div class="card" data-cat="fun" data-url="games/blockblast/index.html">
      <div class="star" onclick="toggleFav(event,this)">☆</div>
      <img src="">
      <h3>Block Blast</h3>
    </div>
  </div>
</div>

<div class="footer-phrase">
  zesty ahh year 7 created ts 😭
</div>

<div id="player">
  <div id="close" onclick="closeGame()">&times;</div>
  <iframe id="frame"></iframe>
</div>

<script>
let fav = JSON.parse(localStorage.getItem("fav") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

// Apply click events to cards
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener('click', function() {
    openGame(this.dataset.url);
  });
});

function openGame(url) {
  document.getElementById("player").style.display = "block";
  document.getElementById("frame").src = url;
  
  // Update Recent list
  recent = recent.filter(item => item !== url); // Remove if exists
  recent.unshift(url); // Add to front
  recent = recent.slice(0, 10); // Keep top 10
  localStorage.setItem("recent", JSON.stringify(recent));
}

function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

function searchGames() {
  let v = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none";
  });
}

function filter(cat) {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = (cat === "all" || c.dataset.cat === cat) ? "block" : "none";
  });
}

function toggleFav(e, el) {
  e.stopPropagation();
  let card = el.closest(".card");
  let url = card.dataset.url;
  if (fav.includes(url)) {
    fav = fav.filter(f => f !== url);
    el.innerText = "☆";
  } else {
    fav.push(url);
    el.innerText = "★";
  }
  localStorage.setItem("fav", JSON.stringify(fav));
}

function showFavorites() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = fav.includes(c.dataset.url) ? "block" : "none";
  });
}

function showRecent() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = recent.includes(c.dataset.url) ? "block" : "none";
  });
}

function showAll() {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = "block";
  });
}

// Initial star state check
document.querySelectorAll(".card").forEach(card => {
  if(fav.includes(card.dataset.url)) {
    card.querySelector(".star").innerText = "★";
  }
});
</script>

</body>
</html>
