<style>:root{--primary:#fc2651;--primary-hover:#e91e47;--primary-light:rgba(252,38,81,0.1);--accent:#8b5cf6;--bg-darkest:#020617;--bg-dark:#0f172a;--bg-card:#1e293b;--bg-card-hover:#334155;--text-main:#f8fafc;--text-muted:#94a3b8;--text-dim:#64748b;--border:#1e293b;--shadow-sm:0 1px 2px 0 rgb(0 0 0/0.05);--shadow-md:0 4px 6px -1px rgb(0 0 0/0.1);--shadow-lg:0 10px 15px -3px rgb(0 0 0/0.1);--shadow-neon:0 0 20px rgba(252,38,81,0.3);--font-main:"Poppins",sans-serif;--radius-sm:6px;--radius-md:12px;--radius-lg:16px;--transition:all 0.3s cubic-bezier(0.4,0,0.2,1);--gradient-primary:linear-gradient(135deg,#fc2651 0%,#e91e47 100%)}*{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--bg-card-hover) var(--bg-darkest)}body{background-color:var(--bg-dark);color:var(--text-main);font-family:var(--font-main);margin:0;padding:0;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}::-webkit-scrollbar{width:10px;height:10px;background:var(--bg-darkest)}::-webkit-scrollbar-thumb{background:var(--bg-card-hover);border-radius:5px;border:2px solid var(--bg-darkest)}::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}header{background:var(--gradient-primary);position:sticky;top:0;z-index:1000;box-shadow:var(--shadow-lg);padding-bottom:0}#searchBar::placeholder{color:rgba(255,255,255,0.7)}#searchBar:focus{background:#fff;color:var(--bg-darkest);box-shadow:0 0 0 4px rgba(255,255,255,0.1)}#searchBar:focus~.search-icon{color:var(--bg-darkest)}.btn-icon:hover{background:#fff;color:var(--primary);transform:translateY(-2px)}.nav-content::-webkit-scrollbar{display:none}.nav-link:hover{color:#fff}.nav-link.active::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:3px;background:#fff;border-radius:3px 3px 0 0}main{flex:1;width:100%;max-width:1400px;margin:0 auto;padding:2rem 1.5rem}.section-title::before{content:"";display:block;width:6px;height:24px;background:var(--primary);border-radius:3px}#sortOptions:hover{background:var(--bg-card-ho
